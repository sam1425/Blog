<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>mini games | sam's</title>
        <link rel="stylesheet" type="text/css" href="../../main.css" />
        <link rel="stylesheet" type="text/css" href="../../gruv_dark/gruv.css" />
        <style>
            .game-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                width: 100%;
                max-width: 800px;
            }
            .canvas-wrapper {
                position: relative;
                border: 4px solid var(--fg2);
                border-radius: 8px;
                background: #1d2021;
                overflow: hidden;
                box-shadow: var(--shadow-black);
            }
            canvas {
                display: block;
                image-rendering: pixelated;
                cursor: crosshair;
            }
            .game-info {
                text-align: center;
                margin-top: 10px;
            }
            .btn-start {
                padding: 10px 20px;
                background: var(--blue);
                color: #282828;
                border: none;
                font-family: 'shorthike', sans-serif;
                font-size: 1.2rem;
                cursor: pointer;
                border-radius: 4px;
                margin-top: 10px;
            }
            .btn-start:hover {
                background: var(--fg);
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <span id="c0mplex">Mini Games</span>
        </div>

        <main id="content">
            <div id="leftside">
                <div id="sidebar-placeholder"></div>
            </div>

            <div class="game-container">
                <!-- Game 1: Cat Catch -->
                <div class="card">
                    <h2>Cat Catch</h2>
                    <p>Move the cat with [A/D] or [Left/Right] arrows to catch the falling hearts!</p>
                    <div class="canvas-wrapper">
                        <canvas id="catGame" width="400" height="400"></canvas>
                    </div>
                    <div class="game-info">
                        <span id="catScore">Score: 0</span>
                        <br>
                        <button class="btn-start" id="startCatGame">Start Game</button>
                    </div>
                </div>

                <!-- Game 2: Neon Runner -->
                <div class="card">
                    <h2>Neon Runner</h2>
                    <p>Press [Space] or [Click] to jump over the obstacles!</p>
                    <div class="canvas-wrapper">
                        <canvas id="runnerGame" width="400" height="200"></canvas>
                    </div>
                    <div class="game-info">
                        <span id="runnerScore">Score: 0</span>
                        <br>
                        <button class="btn-start" id="startRunnerGame">Start Game</button>
                    </div>
                </div>
            </div>

            <script>
                // --- Game 1: Cat Catch ---
                (function initCatGame() {
                    const canvas = document.getElementById('catGame');
                    const ctx = canvas.getContext('2d');
                    const scoreEl = document.getElementById('catScore');
                    const startBtn = document.getElementById('startCatGame');
                    
                    let score = 0;
                    let gameActive = false;
                    let player = { x: 175, y: 340, w: 50, h: 50, speed: 7 };
                    let items = [];
                    let keys = {};

                    // Use the cat image from the repo
                    const catImg = new Image();
                    catImg.src = '../../majo/mimagenes/cathand.jpg';

                    function spawnItem() {
                        items.push({
                            x: Math.random() * (canvas.width - 20),
                            y: -20,
                            size: 20,
                            speed: 2 + Math.random() * 3
                        });
                    }

                    function update() {
                        if (!gameActive) return;

                        if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
                        if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
                        
                        if (player.x < 0) player.x = 0;
                        if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

                        items.forEach((item, index) => {
                            item.y += item.speed;
                            
                            // Collision
                            if (item.y + item.size > player.y && 
                                item.x + item.size > player.x && 
                                item.x < player.x + player.w) {
                                items.splice(index, 1);
                                score++;
                                scoreEl.textContent = `Score: ${score}`;
                            }

                            // Off screen
                            if (item.y > canvas.height) {
                                items.splice(index, 1);
                                if (score > 0) score--;
                                scoreEl.textContent = `Score: ${score}`;
                            }
                        });

                        if (Math.random() < 0.03) spawnItem();
                    }

                    function draw() {
                        ctx.fillStyle = '#282828';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        // Draw Player
                        ctx.drawImage(catImg, player.x, player.y, player.w, player.h);

                        // Draw Items
                        ctx.fillStyle = '#fb4934'; // Hearts
                        items.forEach(item => {
                            ctx.beginPath();
                            ctx.arc(item.x + 10, item.y + 10, 8, 0, Math.PI * 2);
                            ctx.fill();
                        });

                        if (!gameActive) {
                            ctx.fillStyle = 'rgba(0,0,0,0.5)';
                            ctx.fillRect(0,0,canvas.width, canvas.height);
                            ctx.fillStyle = '#ebdbb2';
                            ctx.font = '20px shorthike';
                            ctx.textAlign = 'center';
                            ctx.fillText('Click Start to Play', canvas.width/2, canvas.height/2);
                        }
                    }

                    function gameLoop() {
                        update();
                        draw();
                        requestAnimationFrame(gameLoop);
                    }

                    window.addEventListener('keydown', e => keys[e.key] = true);
                    window.addEventListener('keyup', e => keys[e.key] = false);
                    
                    startBtn.onclick = () => {
                        score = 0;
                        scoreEl.textContent = `Score: 0`;
                        items = [];
                        gameActive = true;
                        startBtn.blur();
                    };

                    gameLoop();
                })();

                // --- Game 2: Neon Runner ---
                (function initRunnerGame() {
                    const canvas = document.getElementById('runnerGame');
                    const ctx = canvas.getContext('2d');
                    const scoreEl = document.getElementById('runnerScore');
                    const startBtn = document.getElementById('startRunnerGame');

                    let gameActive = false;
                    let score = 0;
                    let player = { x: 50, y: 150, w: 30, h: 30, dy: 0, jumpPower: -12, grounded: true };
                    let obstacles = [];
                    let frame = 0;
                    const gravity = 0.8;

                    function jump() {
                        if (player.grounded && gameActive) {
                            player.dy = player.jumpPower;
                            player.grounded = false;
                        }
                    }

                    window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
                    canvas.onclick = jump;

                    function update() {
                        if (!gameActive) return;

                        player.dy += gravity;
                        player.y += player.dy;

                        if (player.y + player.h > 180) {
                            player.y = 180 - player.h;
                            player.dy = 0;
                            player.grounded = true;
                        }

                        if (frame % 80 === 0) {
                            obstacles.push({ x: canvas.width, y: 150, w: 20, h: 30 });
                        }

                        obstacles.forEach((obs, index) => {
                            obs.x -= 5;
                            
                            // Collision
                            if (player.x < obs.x + obs.w &&
                                player.x + player.w > obs.x &&
                                player.y < obs.y + obs.h &&
                                player.y + player.h > obs.y) {
                                gameActive = false;
                                alert('Game Over! Score: ' + score);
                            }

                            if (obs.x + obs.w < 0) {
                                obstacles.splice(index, 1);
                                score++;
                                scoreEl.textContent = `Score: ${score}`;
                            }
                        });

                        frame++;
                    }

                    function draw() {
                        ctx.fillStyle = '#1d2021';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        // Ground
                        ctx.strokeStyle = '#83a598';
                        ctx.beginPath();
                        ctx.moveTo(0, 180);
                        ctx.lineTo(canvas.width, 180);
                        ctx.stroke();

                        // Player
                        ctx.fillStyle = '#b8bb26';
                        ctx.fillRect(player.x, player.y, player.w, player.h);

                        // Obstacles
                        ctx.fillStyle = '#fb4934';
                        obstacles.forEach(obs => {
                            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        });

                        if (!gameActive && frame > 0) {
                             ctx.fillStyle = '#ebdbb2';
                             ctx.font = '20px shorthike';
                             ctx.textAlign = 'center';
                             ctx.fillText('Game Over!', canvas.width/2, canvas.height/2);
                        }
                    }

                    function gameLoop() {
                        update();
                        draw();
                        requestAnimationFrame(gameLoop);
                    }

                    startBtn.onclick = () => {
                        score = 0;
                        scoreEl.textContent = `Score: 0`;
                        obstacles = [];
                        player.y = 150;
                        gameActive = true;
                        frame = 1;
                        startBtn.blur();
                    };

                    gameLoop();
                })();
            </script>
        </main>

        <footer>
            <span id="copy"> 🞜 c0mplex © 2025. </span>
        </footer>

        <script src="../../spa.js"></script>
    </body>
</html>
