<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mini games | sam's</title>
    <link rel="stylesheet" type="text/css" href="/css/main.css" />
    <link rel="stylesheet" type="text/css" href="/css/gruv.css" />
    <style>
      .game-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 20px;
          width: 100%;
          max-width: 800px;
      }
      .canvas-wrapper {
          cursor: cross;
          position: relative;
          border: 4px solid var(--fg2);
          border-radius: 8px;
          background: #1d2021;
          overflow: hidden;
          box-shadow: var(--shadow-black);
      }
      canvas {
          display: block;
          image-rendering: pixelated;
          cursor: pointer;
      }
      .game-info {
          text-align: center;
          margin-top: 10px;
      }
      .btn-start {
          padding: 10px 20px;
          background: var(--blue);
          color: #282828;
          border: none;
          font-family: 'shorthike', sans-serif;
          font-size: 1.2rem;
          cursor: pointer;
          border-radius: 4px;
          margin-top: 10px;
      }
      .btn-start:hover {
          background: var(--fg);
      }

      .canvas-wrapper:fullscreen {
          transform: none;
          width: 1280px;
          height: 720px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          border: none;
          overflow: visible;
      }

      .btn-exit {
          position: absolute;
          top: 8px;
          right: 8px;
          padding: 5px 8px;
          background: rgba(40, 40, 40, 0.85);
          color: var(--fg);
          border: 1px solid var(--fg4);
          cursor: pointer;
          border-radius: 4px;
          font-family: 'shorthike', sans-serif;
          z-index: 10;
      }

      .btn-fullscreen {
          position: absolute;
          bottom: 8px;
          right: 8px;
          padding: 5px 15px;
          background: rgba(40, 40, 40, 0.85);
          color: var(--fg);
          border: 1px solid var(--fg4);
          cursor: pointer;
          border-radius: 4px;
          font-family: 'shorthike', sans-serif;
          z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <span id="c0mplex">Mini Games</span>
    </div>

    <main id="content">
      <div id="leftside">
        <div id="sidebar-placeholder"></div>
      </div>
      <div class="game-container">
        <!-- Game 1: Autotiling -->
        <div class="card">
          <h2>Autotiling (Lua/WASM)</h2>
          <p>A procedural autotiling demonstration compiled from Lua to WASM.</p>
          <div style="position: relative; display: inline-block;">
            <div class="canvas-wrapper" style="width: 640px; height: 320px;">
              <div class="game-overlay" onclick="loadGame(this, '/subpages/games/love.js/autotiling.html')">
                <span>▶ load</span>
              </div>
              <iframe width="1280" height="720" frameborder="0" allowfullscreen></iframe>
            </div>
            <button class="btn-fullscreen" onclick="toggleFullscreen(this.previousElementSibling)">
              Fullscreen
            </button>
            <button class="btn-exit" onclick="unloadGame(this.parentElement.querySelector('.canvas-wrapper'))">
              ✖
            </button>
          </div>
        </div>

        <!-- game 2: kingofnaipes-->
        <div class="card">
          <h2>king of naipes</h2>
          <p>a game inspirated on vampire survivors</p>
          <div style="position: relative; display: inline-block;">
            <div class="canvas-wrapper" style="width: 640px; height: 320px;">
              <div class="game-overlay" onclick="loadGame(this, '/subpages/games/love.js/kingofnaipes.html')">
                <span>▶ load</span>
              </div>
              <iframe width="800" height="600" frameborder="0" allowfullscreen></iframe>
            </div>
            <button class="btn-fullscreen" onclick="toggleFullscreen(this.previousElementSibling)">
              Fullscreen
            </button>
            <button class="btn-exit" onclick="unloadGame(this.parentElement.querySelector('.canvas-wrapper'))">
              ✖
            </button>

          </div>
        </div>
        <script>
          function toggleFullscreen(wrapper) {
              if (!document.fullscreenElement) {
                  wrapper.requestFullscreen().catch(err => {
                      console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                  });
              } else {
                  document.exitFullscreen();
              }
          }

          function loadGame(overlay, src) {
              const wrapper = overlay.parentElement;
              const iframe = wrapper.querySelector('iframe');
              const exitBtn = wrapper.parentElement.querySelector('.btn-exit'); // go up one level
              iframe.src = src;
              overlay.style.opacity = '0';
              setTimeout(() => {
                  overlay.style.display = 'none';
                  if (exitBtn) exitBtn.style.display = 'block';
              }, 300);
          }

          function unloadGame(wrapper) {
              const iframe = wrapper.querySelector('iframe');
              const overlay = wrapper.querySelector('.game-overlay');
              const exitBtn = wrapper.parentElement.querySelector('.btn-exit'); // same fix here
              iframe.src = '';
              exitBtn.style.display = 'none';
              overlay.style.display = 'flex';
              setTimeout(() => overlay.style.opacity = '1', 10);
          }
        </script>
    </main>

    <footer></footer>

    <script src="/js/spa.js"></script>
  </body>
</html>
